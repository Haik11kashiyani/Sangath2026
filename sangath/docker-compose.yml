version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sangath-postgres
    environment:
      POSTGRES_DB: sangath_db
      POSTGRES_USER: sangath_user
      POSTGRES_PASSWORD: sangath_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/migrations/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sangath_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sangath-api
    ports:
      - "5000:5000"
    environment:
      DB_HOST: postgres
      DB_USER: sangath_user
      DB_PASSWORD: sangath_pass
      DB_NAME: sangath_db
      DB_PORT: 5432
      API_PORT: 5000
      NODE_ENV: development
      JWT_SECRET: dev_jwt_secret_please_change_in_production_min_32_chars
      JWT_REFRESH_SECRET: dev_refresh_secret_please_change_in_production
      FRONTEND_URL: http://localhost:3000
      ADMIN_URL: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
    
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sangath-frontend
    ports:
      - "3000:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - api
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: sangath-admin
    ports:
      - "3001:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - api
    volumes:
      - ./src/admin:/app/src/admin

volumes:
  postgres_data:
